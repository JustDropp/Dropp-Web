<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dropp</title>
    <script>
      // SPA redirect for GitHub Pages
      // When GitHub Pages can't find a path (e.g. /verify-email?token=...),
      // it serves this 404.html. We encode the full path+query into the root
      // URL so that index.html is served, then the script there decodes it back.
      (function () {
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' +
          encodeURIComponent(l.pathname + l.search + l.hash)
        );
      })();
    </script>
  </head>
  <body></body>
</html>
